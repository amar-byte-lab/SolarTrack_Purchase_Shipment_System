<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vendor Master — Solar Purchase Tracker</title>
<link rel="stylesheet" href="assets/css/bootstrap.min.css">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="app-shell">
  <div id="sidebar"></div>
  <div class="main-content">
    <div class="topbar" id="topbar"></div>
    <div class="page-body">
      <div class="d-flex mb-3">
        <input type="text" class="form-control w-auto flex-grow-1" id="fSearch" placeholder="Search by vendor name, phone, GSTIN...">
      </div>
      <div class="st-card p-0">
        <div class="table-responsive">
          <table class="table table-hover mb-0" id="vendorsTable">
            <thead><tr>
              <th>Vendor Name</th><th>Phone</th><th>Email</th><th>GSTIN</th><th>Address</th><th class="no-print">Actions</th>
            </tr></thead>
            <tbody></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="modal fade" id="vendorModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header"><h5 class="modal-title" id="vendorModalTitle">New Vendor</h5><button class="btn-close" data-bs-dismiss="modal"></button></div>
      <div class="modal-body">
        <input type="hidden" id="mOrigName">
        <div class="mb-2"><label class="form-label">Vendor Name *</label><input class="form-control" id="mVendorName"></div>
        <div class="mb-2"><label class="form-label">Address</label><textarea class="form-control" id="mAddress" rows="2"></textarea></div>
        <div class="mb-2"><label class="form-label">Phone</label><input class="form-control" id="mPhone"></div>
        <div class="mb-2"><label class="form-label">GSTIN</label><input class="form-control" id="mGSTIN"></div>
        <div class="mb-2"><label class="form-label">Email</label><input type="email" class="form-control" id="mEmail"></div>
        <div class="mb-2"><label class="form-label">Remarks</label><input class="form-control" id="mRemarks"></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
        <button class="btn btn-primary" id="btnSaveVendor">Save</button>
      </div>
    </div>
  </div>
</div>

<script src="assets/js/bootstrap.bundle.min.js"></script>
<script src="assets/js/xlsx.full.min.js"></script>
<script src="js/db.js"></script>
<script src="js/calc.js"></script>
<script src="js/validation.js"></script>
<script src="js/utils.js"></script>
<script src="js/ui.js"></script>
<script src="js/connect.js"></script>
<script src="js/vendor-master.js"></script>
</body>
</html>
