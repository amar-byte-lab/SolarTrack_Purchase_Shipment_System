<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — Solar Purchase & Shipment Tracker</title>
<link rel="stylesheet" href="assets/css/bootstrap.min.css">
<link rel="stylesheet" href="css/style.css">
<script src="js/auth.js"></script>
<style>
  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, var(--st-blue-900, #0F2027), #203A43, var(--st-blue-700, #2C5364));
    margin: 0;
    padding: 20px;
    font-family: system-ui, -apple-system, sans-serif;
  }
  .login-card {
    background: rgba(255, 255, 255, 0.96);
    backdrop-filter: blur(10px);
    border-radius: 16px;
    box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
    width: 100%;
    max-width: 400px;
    padding: 35px 30px;
    border: 1px solid rgba(255, 255, 255, 0.3);
  }
  .brand-logo {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-bottom: 25px;
  }
  .brand-logo svg {
    color: var(--st-orange, #FF9F43);
  }
  .brand-logo h3 {
    font-weight: 800;
    color: var(--st-blue-900, #0F2027);
    margin: 0;
    letter-spacing: -0.5px;
  }
  .form-control:focus {
    border-color: var(--st-blue-600, #2470A0);
    box-shadow: 0 0 0 0.2rem rgba(36, 112, 160, 0.2);
  }
  .btn-login {
    background: linear-gradient(135deg, #1e3c72, #2a5298);
    border: none;
    color: #fff;
    font-weight: 600;
    padding: 11px;
    border-radius: 8px;
    width: 100%;
    transition: all 0.2s ease;
  }
  .btn-login:hover {
    background: linear-gradient(135deg, #2a5298, #1e3c72);
    color: #fff;
    transform: translateY(-1px);
  }
</style>
</head>
<body>

<div class="login-card">
  <!-- Header / Brand -->
  <div class="brand-logo">
    <svg xmlns="http://www.w3.org/2000/svg" width="38" height="38" fill="currentColor" viewBox="0 0 16 16">
      <path d="M1 2a1 1 0 0 1 1-1h5a1 1 0 0 1 1 1v5a1 1 0 0 1-1 1H2a1 1 0 0 1-1-1V2zm8 0a1 1 0 0 1 1-1h5a1 1 0 0 1 1 1v5a1 1 0 0 1-1 1H9a1 1 0 0 1-1-1V2zM1 9a1 1 0 0 1 1-1h5a1 1 0 0 1 1 1v5a1 1 0 0 1-1 1H2a1 1 0 0 1-1-1V9zm8 0a1 1 0 0 1 1-1h5a1 1 0 0 1 1 1v5a1 1 0 0 1-1 1H9a1 1 0 0 1-1-1V9z"/>
    </svg>
    <h3>Solar<span style="color:var(--st-orange, #FF9F43)">Track</span></h3>
  </div>

  <!-- View 1: Login Form -->
  <div id="loginView">
    <h5 class="fw-bold text-center text-dark mb-1">Sign In to Account</h5>
    <p class="text-muted text-center fs-8 mb-4">Enter your User ID and Password to continue</p>

    <!-- Error Alert -->
    <div id="loginAlert" class="alert alert-danger py-2 px-3 fs-8 mb-3" style="display: none;" role="alert"></div>
    <div id="loginSuccess" class="alert alert-success py-2 px-3 fs-8 mb-3" style="display: none;" role="alert"></div>

    <form id="loginForm" autocomplete="off">
      <div class="mb-3 text-start">
        <label for="txtUserid" class="form-label fs-8 fw-semibold text-secondary">User ID / Username / Email</label>
        <input type="text" class="form-control form-control-lg fs-7" id="txtUserid" placeholder="Enter User ID or Email" required autofocus>
      </div>

      <div class="mb-3 text-start">
        <div class="d-flex justify-content-between align-items-center">
          <label for="txtPassword" class="form-label fs-8 fw-semibold text-secondary mb-1">Password</label>
          <a href="#" class="fs-8 text-decoration-none" onclick="switchToForgot(event)">Forgot Password?</a>
        </div>
        <input type="password" class="form-control form-control-lg fs-7" id="txtPassword" placeholder="Enter Password" required>
      </div>

      <button type="submit" class="btn btn-login fs-7 mb-3" id="btnLoginSubmit">
        🔑 Sign In
      </button>

      <div class="text-center">
        <span class="text-muted fs-8">Don't have an account? </span>
        <a href="#" class="fs-8 text-decoration-none fw-semibold" onclick="switchToRegister(event)">Sign Up</a>
      </div>
    </form>
  </div>

  <!-- View 2: Register Form -->
  <div id="registerView" style="display: none;">
    <h5 class="fw-bold text-center text-dark mb-1">Create an Account</h5>
    <p class="text-muted text-center fs-8 mb-4">Fill details to register a new user</p>

    <div id="registerAlert" class="alert alert-danger py-2 px-3 fs-8 mb-3" style="display: none;" role="alert"></div>

    <form id="registerForm" autocomplete="off">
      <div class="mb-2 text-start">
        <label for="txtRegUserid" class="form-label fs-8 fw-semibold text-secondary mb-1">User ID</label>
        <input type="text" class="form-control form-control-sm fs-7" id="txtRegUserid" placeholder="e.g. johndoe" required>
      </div>

      <div class="mb-2 text-start">
        <label for="txtRegName" class="form-label fs-8 fw-semibold text-secondary mb-1">Full Name</label>
        <input type="text" class="form-control form-control-sm fs-7" id="txtRegName" placeholder="e.g. John Doe" required>
      </div>

      <div class="mb-2 text-start">
        <label for="txtRegEmail" class="form-label fs-8 fw-semibold text-secondary mb-1">Email Address</label>
        <input type="email" class="form-control form-control-sm fs-7" id="txtRegEmail" placeholder="e.g. john@example.com" required>
      </div>

      <div class="mb-2 text-start">
        <label for="txtRegPassword" class="form-label fs-8 fw-semibold text-secondary mb-1">Password</label>
        <input type="password" class="form-control form-control-sm fs-7" id="txtRegPassword" placeholder="Enter Password" required>
      </div>

      <div class="mb-3 text-start">
        <label for="selectRegRole" class="form-label fs-8 fw-semibold text-secondary mb-1">Request Role</label>
        <select class="form-select form-select-sm fs-7" id="selectRegRole" required>
          <!-- Roles populated dynamically -->
        </select>
      </div>

      <button type="submit" class="btn btn-login fs-7 mb-3" id="btnRegisterSubmit">
        📝 Register Account
      </button>

      <div class="text-center">
        <a href="#" class="fs-8 text-decoration-none fw-semibold" onclick="switchToLogin(event)">Back to Sign In</a>
      </div>
    </form>
  </div>

  <!-- View 3: Forgot Password Form -->
  <div id="forgotView" style="display: none;">
    <h5 class="fw-bold text-center text-dark mb-1">Forgot Password</h5>
    <p class="text-muted text-center fs-8 mb-4">Enter your registered email address to receive reset instructions</p>

    <div id="forgotAlert" class="alert alert-danger py-2 px-3 fs-8 mb-3" style="display: none;" role="alert"></div>

    <form id="forgotForm" autocomplete="off">
      <div class="mb-4 text-start">
        <label for="txtForgotEmail" class="form-label fs-8 fw-semibold text-secondary mb-1">Registered Email</label>
        <input type="email" class="form-control form-control-lg fs-7" id="txtForgotEmail" placeholder="Enter your email" required autofocus>
      </div>

      <button type="submit" class="btn btn-login fs-7 mb-3" id="btnForgotSubmit">
        ✉️ Send Reset Link
      </button>

      <div class="text-center">
        <a href="#" class="fs-8 text-decoration-none fw-semibold" onclick="switchToLogin(event)">Back to Sign In</a>
      </div>
    </form>
  </div>
</div>

<script src="assets/js/bootstrap.bundle.min.js"></script>
<script>
  function hideAllAlerts() {
    document.getElementById('loginAlert').style.display = 'none';
    document.getElementById('loginSuccess').style.display = 'none';
    document.getElementById('registerAlert').style.display = 'none';
    document.getElementById('forgotAlert').style.display = 'none';
  }

  function switchToLogin(e) {
    if (e) e.preventDefault();
    hideAllAlerts();
    document.getElementById('loginView').style.display = 'block';
    document.getElementById('registerView').style.display = 'none';
    document.getElementById('forgotView').style.display = 'none';
  }

  async function switchToRegister(e) {
    if (e) e.preventDefault();
    hideAllAlerts();
    document.getElementById('loginView').style.display = 'none';
    document.getElementById('registerView').style.display = 'block';
    document.getElementById('forgotView').style.display = 'none';

    // Fetch roles list dynamically
    try {
      const select = document.getElementById('selectRegRole');
      select.innerHTML = '<option value="">Loading roles...</option>';
      const res = await fetch('/api/roles');
      if (res.ok) {
        const data = await res.json();
        const roles = data.roles || ['user', 'partner'];
        // Filter roles to exclude admin and superadmin to prevent self-escalation, but let's list them or allow partner/user
        select.innerHTML = roles.map(r => `<option value="${r}">${r}</option>`).join('');
      } else {
        select.innerHTML = '<option value="user">user</option><option value="partner">partner</option>';
      }
    } catch (err) {
      document.getElementById('selectRegRole').innerHTML = '<option value="user">user</option><option value="partner">partner</option>';
    }
  }

  function switchToForgot(e) {
    if (e) e.preventDefault();
    hideAllAlerts();
    document.getElementById('loginView').style.display = 'none';
    document.getElementById('registerView').style.display = 'none';
    document.getElementById('forgotView').style.display = 'block';
  }

  // 1. Sign In Submit
  document.getElementById('loginForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const alertEl = document.getElementById('loginAlert');
    const successEl = document.getElementById('loginSuccess');
    const submitBtn = document.getElementById('btnLoginSubmit');

    alertEl.style.display = 'none';
    successEl.style.display = 'none';
    submitBtn.disabled = true;
    submitBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Signing in...';

    const userid = document.getElementById('txtUserid').value;
    const password = document.getElementById('txtPassword').value;

    const res = await Auth.login(userid, password);

    if (res.success) {
      if (res.user.role === 'admin' || res.user.role === 'superadmin' || res.user.userid === 'amar') {
        window.location.href = 'dashboard.html';
      } else if (res.user.role === 'partner') {
        window.location.href = 'installments.html';
      } else {
        window.location.href = 'offer.html';
      }
    } else {
      alertEl.textContent = res.error || 'Invalid User ID or Password';
      alertEl.style.display = 'block';
      submitBtn.disabled = false;
      submitBtn.innerHTML = '🔑 Sign In';
    }
  });

  // 2. Register Submit
  document.getElementById('registerForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const alertEl = document.getElementById('registerAlert');
    const successEl = document.getElementById('loginSuccess');
    const submitBtn = document.getElementById('btnRegisterSubmit');

    alertEl.style.display = 'none';
    submitBtn.disabled = true;
    submitBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Registering...';

    const userid = document.getElementById('txtRegUserid').value.trim().toLowerCase();
    const username = document.getElementById('txtRegName').value.trim();
    const email = document.getElementById('txtRegEmail').value.trim().toLowerCase();
    const password = document.getElementById('txtRegPassword').value;
    const role = document.getElementById('selectRegRole').value;

    try {
      const res = await fetch('/api/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ userid, username, email, password, role })
      });
      const data = await res.json();
      if (res.ok && data.success) {
        successEl.textContent = data.message || 'Registration request sent successfully!';
        successEl.style.display = 'block';
        switchToLogin();
      } else {
        alertEl.textContent = data.error || 'Registration failed.';
        alertEl.style.display = 'block';
      }
    } catch (err) {
      alertEl.textContent = 'Server connection error.';
      alertEl.style.display = 'block';
    } finally {
      submitBtn.disabled = false;
      submitBtn.innerHTML = '📝 Register Account';
    }
  });

  // 3. Forgot Password Submit
  document.getElementById('forgotForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const alertEl = document.getElementById('forgotAlert');
    const successEl = document.getElementById('loginSuccess');
    const submitBtn = document.getElementById('btnForgotSubmit');

    alertEl.style.display = 'none';
    submitBtn.disabled = true;
    submitBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Sending...';

    const email = document.getElementById('txtForgotEmail').value.trim().toLowerCase();

    try {
      const res = await fetch('/api/forgot-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email })
      });
      const data = await res.json();
      if (res.ok && data.success) {
        successEl.textContent = data.message || 'If registered, a password reset link has been sent!';
        successEl.style.display = 'block';
        switchToLogin();
      } else {
        alertEl.textContent = data.error || 'Request failed.';
        alertEl.style.display = 'block';
      }
    } catch (err) {
      alertEl.textContent = 'Server connection error.';
      alertEl.style.display = 'block';
    } finally {
      submitBtn.disabled = false;
      submitBtn.innerHTML = '✉️ Send Reset Link';
    }
  });
</script>
</body>
</html>
