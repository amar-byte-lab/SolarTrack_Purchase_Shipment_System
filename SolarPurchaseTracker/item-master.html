<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Products — Solar Purchase Tracker</title>
<link rel="stylesheet" href="assets/css/bootstrap.min.css">
<link rel="stylesheet" href="css/style.css">
<script src="js/auth.js"></script>
<style>
  .product-header {
    background-color: #ffffff;
    border: 1px solid #dee2e6;
    border-radius: 8px;
    padding: 12px 16px;
    cursor: pointer;
    transition: background-color 0.15s, box-shadow 0.15s;
    user-select: none;
  }
  .product-header:hover {
    background-color: #f8f9fa;
    box-shadow: 0 2px 6px rgba(0,0,0,0.05);
  }
  .product-items-table {
    border: 1px solid #dee2e6;
    border-top: none;
    border-radius: 0 0 8px 8px;
    background-color: #ffffff;
    padding: 15px;
    margin-top: -4px;
    margin-bottom: 10px;
    font-size: 0.85rem;
  }
  .btn-action-sm {
    padding: 2px 6px !important;
    font-size: 0.75rem !important;
    border-radius: 4px !important;
  }
</style>
</head>
<body>

<div class="app-shell">
  <div id="sidebar"></div>
  <div class="main-content">
    <div class="topbar" id="topbar"></div>
    <div class="page-body">
      <!-- Nav Pills -->
      <ul class="nav nav-pills mb-3 gap-2 border-bottom pb-2" id="itemMasterTabs" role="tablist">
        <li class="nav-item" role="presentation">
          <button class="nav-link active px-4 py-2 fw-semibold" id="items-tab" data-bs-toggle="pill" data-bs-target="#items-pane" type="button" role="tab" style="font-size:0.85rem; border-radius:8px;">Items List</button>
        </li>
        <li class="nav-item" role="presentation">
          <button class="nav-link px-4 py-2 fw-semibold" id="products-tab" data-bs-toggle="pill" data-bs-target="#products-pane" type="button" role="tab" style="font-size:0.85rem; border-radius:8px;">Product Sets</button>
        </li>
      </ul>

      <!-- Tab Panes -->
      <div class="tab-content" id="itemMasterTabContent">
        <!-- Tab 1: Items List -->
        <div class="tab-pane fade show active" id="items-pane" role="tabpanel" aria-labelledby="items-tab">
          <div class="d-flex mb-3">
            <input type="text" class="form-control w-auto flex-grow-1" id="fSearch" placeholder="Search by item name, category, HSN code...">
          </div>
          <div class="st-card p-0 overflow-hidden">
            <div class="table-responsive">
              <table class="table table-installments table-hover mb-0" id="itemsTable">
                <thead><tr>
                  <th>Item Name</th><th>Category</th><th>Unit</th><th>HSN Code</th><th>GST %</th><th>Status</th><th class="no-print" style="width: 90px;">Actions</th>
                </tr></thead>
                <tbody></tbody>
                <tfoot class="no-print">
                  <tr class="add-row-sticky text-success" id="btnAddItemRow" style="cursor: pointer;">
                    <td class="text-center fw-bold" style="font-size: 1.1rem; width: 45px;">+</td>
                    <td colspan="6" class="fw-semibold text-success">
                      Add a new item record...
                    </td>
                  </tr>
                </tfoot>
              </table>
            </div>
          </div>
        </div>

        <!-- Tab 2: Product Sets -->
        <div class="tab-pane fade" id="products-pane" role="tabpanel" aria-labelledby="products-tab">
          <div class="st-card p-0 overflow-hidden">
            <div class="table-responsive">
              <table class="table table-installments table-hover mb-0" id="productsTable">
                <thead>
                  <tr>
                    <th style="width: 40px;" class="no-print text-center"><input class="form-check-input" type="checkbox" id="chkSelectAllProducts" style="cursor:pointer;" title="Select All"></th>
                    <th>Product Set Name</th>
                    <th>Package Components</th>
                    <th class="no-print" style="width: 90px;">Actions</th>
                  </tr>
                </thead>
                <tbody id="productsTbody"></tbody>
                <tfoot class="no-print">
                  <tr class="add-row-sticky text-success" id="btnAddProductRow" style="cursor: pointer;">
                    <td class="text-center fw-bold" style="font-size: 1.1rem; width: 45px;">+</td>
                    <td colspan="3" class="fw-semibold text-success">
                      Add a new product set...
                    </td>
                  </tr>
                </tfoot>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="modal fade" id="itemModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header"><h5 class="modal-title" id="itemModalTitle">New Item</h5><button class="btn-close" data-bs-dismiss="modal"></button></div>
      <div class="modal-body">
        <input type="hidden" id="mOrigName">
        <div class="mb-2"><label class="form-label">Item Name *</label><input class="form-control" id="mItemName"></div>
        <div class="mb-2"><label class="form-label">Category</label><input class="form-control" id="mCategory"></div>
        <div class="mb-2"><label class="form-label">Unit</label><input class="form-control" id="mUnit" placeholder="Pcs / Bag / Meter..."></div>
        <div class="mb-2"><label class="form-label">HSN Code</label><input class="form-control" id="mHSN"></div>
        <div class="mb-2"><label class="form-label">GST %</label><input type="number" min="0" max="100" class="form-control" id="mGST"></div>
        <div class="mb-2"><label class="form-label">Status</label>
          <select class="form-select" id="mStatus"><option>Active</option><option>Inactive</option></select>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
        <button class="btn btn-primary" id="btnSaveItem">Save</button>
      </div>
    </div>
  </div>
</div>

<!-- ══ Product Set Add/Edit Modal ════════════════════════════════ -->
<div class="modal fade" id="productModal" tabindex="-1" data-bs-backdrop="static">
  <div class="modal-dialog modal-md modal-dialog-scrollable">
    <div class="modal-content border-0 shadow-lg" style="border-radius:14px;">
      <div class="modal-header bg-dark text-white py-2" style="border-radius:14px 14px 0 0;">
        <h5 class="modal-title fw-bold fs-6" id="productModalTitle">New Product Set</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body p-3 bg-light">
        <input type="hidden" id="pOrigName">
        
        <div class="mb-3">
          <label class="form-label fs-7 fw-bold text-secondary mb-1" for="pProductName">Product Set Name *</label>
          <input class="form-control form-control-sm fw-semibold" id="pProductName" placeholder="e.g. 3 KW Adani TOPCON DCR set">
        </div>

        <div class="col-12"><hr class="my-2 opacity-25"></div>
        <div class="col-12 d-flex justify-content-between align-items-center mb-2">
          <span class="fw-bold text-primary fs-7">Component Items List</span>
          <button type="button" class="btn btn-xs btn-accent py-1 px-3" onclick="addProductItemRow()">+ Add Item</button>
        </div>

        <!-- Scrollable items container inside the modal body -->
        <div class="table-responsive border rounded bg-white" style="max-height: 250px;">
          <table class="table table-sm align-middle table-bordered mb-0" id="pItemsTable">
            <thead class="table-light fs-7">
              <tr>
                <th>Item Name</th>
                <th style="width: 130px;">Default Price (₹)</th>
                <th style="width: 35px;"></th>
              </tr>
            </thead>
            <tbody id="pItemsTbody" class="fs-7">
              <!-- Dynamically populated rows -->
            </tbody>
          </table>
        </div>
      </div>
      <div class="modal-footer bg-light border-top py-2">
        <button class="btn btn-sm btn-secondary px-3" data-bs-dismiss="modal">Cancel</button>
        <button class="btn btn-sm btn-success px-4 fw-semibold" id="btnSaveProduct">Save Product</button>
      </div>
    </div>
  </div>
</div>

<datalist id="itemList"></datalist>

<script src="assets/js/bootstrap.bundle.min.js"></script>
<script src="assets/js/xlsx.full.min.js"></script>
<script src="js/db.js"></script>
<script src="js/calc.js"></script>
<script src="js/validation.js"></script>
<script src="js/utils.js"></script>
<script src="js/ui.js"></script>
<script src="js/connect.js"></script>
<script src="js/item-master.js"></script>
</body>
</html>
